server:
  port: 8080

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth}
    username: ${SPRING_DATASOURCE_USERNAME:squarely}
    password: ${SPRING_DATASOURCE_PASSWORD}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      # LoginThrottle fails closed, so a *slow* Redis must not become a slow login: cap the
      # command wait and treat a timeout as "can't reach it". 250ms, not 50ms: a local Redis
      # answers in ~1ms, but the *first* command on a cold Netty stack (plus any GC pause)
      # blows a 50ms budget, and failing closed turns that jitter into a 503.
      timeout: 250ms
      # Connecting is not commanding. Lettuce opens the connection lazily on the first command,
      # and a TCP (+TLS, +DNS) handshake blows past 50ms on a cold start or after a Redis
      # restart — capping it that tight 503s every login until a handshake gets lucky.
      connect-timeout: 1s
  jpa:
    hibernate:
      ddl-auto: validate      # Flyway owns the schema
    open-in-view: false
  flyway:
    enabled: true

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET}
    access-ttl: PT15M
    refresh-ttl: P30D
  public-paths: /auth/signup,/auth/login,/auth/refresh

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    # Register by IP: in Compose the container hostname is resolvable, but on a VM/K8s the
    # hostname often isn't what the gateway can dial.
    prefer-ip-address: true
